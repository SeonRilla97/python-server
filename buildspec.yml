version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing requirements..."
      - pip install -r requirements.txt
  build:
    commands:
      - echo "Build started on `date`"
      - echo "Syntax check for FastAPI app..."
      - python -m py_compile main.py
  post_build:
    commands:
      - echo "Build completed on `date`"

artifacts:
  files:
    # 서버 실행에 꼭 필요한 파일들만 명시하여 S3로 보냅니다.
    - "main.py"
    - "requirements.txt"
    - "run.sh"
    # 만약 앞으로 하위 폴더(router 등)가 생기면 아래와 같이 추가하세요.
    # - 'app/**/*'
